<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speakers — BODHI SAMBAD 2026</title>
  <meta name="description" content="Speakers at BODHI SAMBAD 2026 — International Conference on China in South Asia" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#F7F4EF',
            accent: '#D9A441',
            charcoal: '#1D1D1B'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="min-h-screen bg-bg text-charcoal font-sans">
  <header class="sticky top-0 z-30 border-b border-gray-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4">
      <a href="index.html" class="text-lg font-semibold tracking-wide">
        ← Back to Home
      </a>
      <a href="index.html#registration" class="rounded-full bg-accent px-4 py-2 text-sm font-semibold text-white shadow-sm shadow-accent/30 transition hover:bg-accent/90">
        Register Now
      </a>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-12">
    <header class="mx-auto max-w-4xl text-center">
      <h1 class="text-4xl font-semibold tracking-tight text-charcoal">Speakers & Thought Leaders</h1>
      <p class="mt-4 text-base text-gray-700">This gallery highlights the experts driving the conversations at BODHI SAMBAD 2026.</p>
    </header>

    <section class="mt-14">
      <div id="speakersGrid" class="grid gap-8 md:grid-cols-2 lg:grid-cols-3"></div>
    </section>
  </main>

  <footer class="border-t border-gray-200 bg-white py-10">
    <div class="mx-auto flex max-w-7xl flex-col gap-6 px-4 md:flex-row md:items-start md:justify-between">
      <div>
        <h3 class="text-lg font-semibold text-charcoal">CESIF</h3>
        <p class="mt-3 text-sm text-gray-700">Kathmandu, Nepal</p>
        <p class="mt-1 text-sm text-gray-700">Email: <a href="mailto:info@cesifnepal.org" class="text-accent hover:underline">info@cesifnepal.org</a></p>
      </div>
      <div class="text-sm text-gray-500">
        <p>© <span id="currentYearFooter"></span> CESIF. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- Speaker detail modal -->
  <div id="speaker-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
    <div class="relative w-full max-w-2xl overflow-hidden rounded-3xl bg-white shadow-xl">
      <button id="speaker-modal-close" class="absolute right-4 top-4 rounded-full bg-white/80 p-2 text-gray-700 transition hover:bg-white">
        <span class="sr-only">Close</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M10 8.586l4.95-4.95a1 1 0 111.414 1.414L11.414 10l4.95 4.95a1 1 0 11-1.414 1.414L10 11.414l-4.95 4.95a1 1 0 01-1.414-1.414L8.586 10 3.636 5.05a1 1 0 011.414-1.414L10 8.586z" clip-rule="evenodd" />
        </svg>
      </button>
      <div class="grid gap-6 p-8 md:grid-cols-3">
        <div class="md:col-span-1">
          <img id="speaker-modal-image" class="h-48 w-full rounded-2xl object-cover" src="" alt="" />
        </div>
        <div class="md:col-span-2">
          <p id="speaker-modal-role" class="text-sm font-semibold text-accent"></p>
          <h2 id="speaker-modal-name" class="mt-2 text-2xl font-semibold text-charcoal"></h2>
          <p id="speaker-modal-title" class="mt-2 text-sm text-gray-700"></p>
          <hr class="my-4 border-gray-200" />
          <p id="speaker-modal-bio" class="text-sm text-gray-700"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
